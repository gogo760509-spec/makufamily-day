<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【2026馬光家庭日】純愛天后「郭靜」海岸音樂會：同仁專屬點歌許願池</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #319795;
            --background-color: #f0f8ff;
            --card-background: #ffffff;
            --text-color: #2d3748;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, var(--background-color) 0%, #e2e8f0 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .main-banner {
            width: 100%;
            height: auto;
            display: block;
        }

        .form-content {
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        .header p {
            color: #718096;
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .singer-card {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border-left: 5px solid var(--secondary-color);
        }

        .singer-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-right: 15px;
            border: 2px solid white;
            flex-shrink: 0;
        }

        .singer-info-text .tag {
            display: inline-block;
            background-color: var(--secondary-color);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 4px;
        }

        .singer-info-text .name {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0 0 4px 0;
        }

        .singer-info-text .bio {
            font-size: 13px;
            color: #4a5568;
            margin: 0;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .notice-badge {
            font-size: 12px;
            color: #dd6b20;
            background-color: #fffaf0;
            border: 1px dashed #fbd38d;
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: normal;
            display: block;
        }

        .song-list {
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            padding: 10px;
            background-color: #f7fafc;
            max-height: 400px;
            overflow-y: auto;
        }

        .song-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
            transition: background-color 0.2s;
        }

        .song-item:last-child {
            border-bottom: none;
        }

        .song-item:hover {
            background-color: #edf2f7;
        }

        .song-info {
            display: flex;
            align-items: center;
            flex: 1;
            cursor: pointer;
        }

        .song-info input {
            margin-right: 12px;
            transform: scale(1.2);
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .song-details .title {
            font-weight: bold;
        }

        .vote-badge {
            background-color: #feebc8;
            color: #c05621;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .song-details .desc {
            font-size: 12px;
            color: #718096;
        }

        .btn-play {
            background-color: var(--secondary-color);
            color: white !important;
            text-decoration: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .btn-play:hover {
            background-color: #234e52;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #2b6cb0;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="banner.png" alt="2026馬光家庭日主視覺" class="main-banner">

    <div class="form-content">
        <div class="header">
            <h1>【2026馬光家庭日】純愛天后「郭靜」</h1>
            <p>海岸音樂會：同仁專屬點歌許願池！<br>期待在海風與歌聲陪伴下，一同度過美好時光。請選出您最想聽的神曲！</p>
        </div>

        <div class="singer-card">
            <img src="singer.jpg?v=2" alt="活動嘉賓郭靜" class="singer-avatar">
            <div class="singer-info-text">
                <span class="tag">活動嘉賓</span>
                <h3 class="name">純愛天后 ｜ 郭靜 Claire</h3>
                <p class="bio">用最溫柔的純愛系歌聲，陪伴馬光同仁在海風吹拂的港灣畔，合唱出最動人的青春旋律。</p>
            </div>
        </div>

        <form id="voteForm" onsubmit="submitForm(event)">
            <div class="form-group">
                <label for="nickname">同仁暱稱</label>
                <input type="text" id="nickname" class="form-control" placeholder="請輸入您的暱稱" required>
            </div>

            <div class="form-group">
                <label>專屬點歌神曲（右側 ▶ 可試聽經典副歌 MV）</label>
                <span class="notice-badge">💡 溫馨提醒：每位同仁最多可以「複選 3 首」最想聽的神曲喔！</span>
                
                <div class="song-list">
                    
                    <!-- 1. 下一個天亮 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="下一個天亮" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">下一個天亮</span>
                                    <span class="vote-badge" id="count-下一個天亮">讀取中...</span>
                                </div>
                                <span class="desc">國民級療癒神曲，大合唱必備！</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/AEUmLttrY5s?t=117" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 2. 心牆 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="心牆" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">心牆</span>
                                    <span class="vote-badge" id="count-心牆">讀取中...</span>
                                </div>
                                <span class="desc">經典偶像劇片尾曲，KTV 必點！</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/VhCRokYVF1I?t=65" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 3. 我不想忘記你 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="我不想忘記你" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">我不想忘記你</span>
                                    <span class="vote-badge" id="count-我不想忘記你">讀取中...</span>
                                </div>
                                <span class="desc">純愛風格的起點，最溫柔的郭式情歌。</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/K-xda8e2FLc?t=80" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 4. 在樹上唱歌 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="在樹上唱歌" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">在樹上唱歌</span>
                                    <span class="vote-badge" id="count-在樹上唱歌">讀取中...</span>
                                </div>
                                <span class="desc">金曲獎輕快俏皮風，聽了心情會變好。</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/yCq3RLCn2i0?t=63" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 5. 陪著我的時候想著她 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="陪著我的時候想著她" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">陪著我的時候想著她</span>
                                    <span class="vote-badge" id="count-陪著我的時候想著她">讀取中...</span>
                                </div>
                                <span class="desc">揪心系備胎神曲，情感渲染力超強。</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/Hn8yhgxpzS4?t=98" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 6. know 知道 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="know 知道" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">know 知道</span>
                                    <span class="vote-badge" id="count-know_知道">讀取中...</span>
                                </div>
                                <span class="desc">內斂深情，默默守候的雋永經典。</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/ROKxPtX-vt8?t=57" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 7. 不藥而癒 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="不藥而癒" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">不藥而癒</span>
                                    <span class="vote-badge" id="count-不藥而癒">讀取中...</span>
                                </div>
                                <span class="desc">標準療傷情歌，陪伴無數人度過失戀期。</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/DduKGmRCqio?t=61" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 8. 仨人 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="仨人" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">仨人</span>
                                    <span class="vote-badge" id="count-仨人">讀取中...</span>
                                </div>
                                <span class="desc">最具代表性的閨蜜友誼之歌。</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/L8sEFu9ByaA?t=70" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 9. 每一天都不同 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="每一天都不同" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">每一天都不同</span>
                                    <span class="vote-badge" id="count-每一天都不同">讀取中...</span>
                                </div>
                                <span class="desc">充滿正能量的勵志歌曲，給予生活滿滿勇氣。</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/0ZJ5ueYy-j4?t=62" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 10. 我們都能幸福著 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="我們都能幸福著" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">我們都能幸福著</span>
                                    <span class="vote-badge" id="count-我們都能幸福著">讀取中...</span>
                                </div>
                                <span class="desc">成熟釋懷的愛情觀，給彼此最好的祝福。</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/nn18FrDexFE?t=76" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 11. 往未來飛的客機 -->
                    <div class="song-item">
                        <label class="song-info">
                            <input type="checkbox" name="selectedSong" value="往未來飛的客機" onchange="checkMaxSelection(this)">
                            <div class="song-details">
                                <div class="title-wrapper">
                                    <span class="title">往未來飛的客機</span>
                                    <span class="vote-badge" id="count-往未來飛的客機">讀取中...</span>
                                </div>
                                <span class="desc">致 那些即將啟航的夢想，畢業經典曲。</span>
                            </div>
                        </label>
                        <a href="https://youtu.be/NwpkhhLobTs?t=67" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                </div>
            </div>

            <div class="form-group">
                <label for="message">許願池留言 / 想對郭靜說的話</label>
                <textarea id="message" class="form-control" rows="4" placeholder="留下你想說的話..."></textarea>
            </div>

            <button type="submit" class="btn-submit">送出點歌許願</button>
        </form>
    </div>
</div>

<script>
    // 💡 串接您重新部署成功、完全公開的最新網頁應用程式網址
    const gasWebUrl = "https://script.google.com/macros/s/AKfycbzbfBxctNIrO_GkZY557I4ZFwPUubjmkQIYpQ2ybOQ7zKINvoI2Anmvts-aiYSYsoVG_g/exec";

    window.addEventListener('DOMContentLoaded', fetchVotes);

    function fetchVotes() {
        // 利用動態時間戳記參數強制破除瀏覽器針對跨網域請求的舊快取限制
        fetch(`${gasWebUrl}?_=${Date.now()}`)
        .then(response => response.json())
        .then(data => {
            if(data.result === "success") {
                for (const [songName, count] of Object.entries(data.votes)) {
                    const formattedName = songName.replace(" ", "_");
                    const badge = document.getElementById(`count-${formattedName}`);
                    if (badge) {
                        badge.innerText = `${count} 票`;
                    }
                }
            }
        })
        .catch(error => console.error("計票載入失敗:", error));
    }

    function checkMaxSelection(element) {
        const checkboxes = document.querySelectorAll('input[name="selectedSong"]:checked');
        if (checkboxes.length > 3) {
            alert("❌ 每人最多只能勾選 3 首歌曲喔！");
            element.checked = false; 
        }
    }

    function submitForm(event) {
        event.preventDefault();

        const nickname = document.getElementById('nickname').value;
        const message = document.getElementById('message').value;
        const submitBtn = document.querySelector('.btn-submit');

        const checkedBoxes = document.querySelectorAll('input[name="selectedSong"]:checked');
        if (checkedBoxes.length === 0) {
            alert("❌ 請至少選擇 1 首您最期待聽到的歌曲！");
            return;
        }

        const selectedSongsArray = [];
        checkedBoxes.forEach(box => selectedSongsArray.push(box.value));
        const combinedSongs = selectedSongsArray.join(", ");

        submitBtn.disabled = true;
        submitBtn.innerText = "正在傳送許願池...";

        const payload = {
            nickname: nickname,
            selectedSong: combinedSongs,
            message: message
        };

        fetch(gasWebUrl, {
            method: "POST",
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.result === "success") {
                alert(`🎉 投票成功！您的願望已送入許願池囉！\n\n同仁暱稱：${nickname}\n複選歌曲：${combinedSongs}`);
                
                checkedBoxes.forEach(box => {
                    const formattedName = box.value.replace(" ", "_");
                    const targetBadge = document.getElementById(`count-${formattedName}`);
                    if (targetBadge) {
                        const currentCount = parseInt(targetBadge.innerText) || 0;
                        targetBadge.innerText = `${currentCount + 1} 票`;
                    }
                });
                
                document.getElementById('voteForm').reset();
            } else {
                alert("寫入錯誤: " + data.error);
            }
        })
        .catch(error => alert("連線伺服器異常，請確認後端開放狀態再試！"))
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "送出點歌許願";
        });
    }
</script>
</body>
</html>
