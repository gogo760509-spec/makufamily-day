<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #319795;
            --background-color: #f0f8ff;
            --card-background: #ffffff;
            --text-color: #2d3748;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, var(--background-color) 0%, #e2e8f0 100%);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .main-banner {
            width: 100%;
            height: auto;
            display: block;
        }

        .form-content {
            padding: 20px;
        }

        @media (min-width: 480px) {
            .form-content { padding: 30px; }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 22px;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        .header p {
            color: #718096;
            margin: 0;
            font-size: 13px;
            line-height: 1.6;
        }

        .singer-card {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border-left: 5px solid var(--secondary-color);
        }

        .singer-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-right: 12px;
            border: 2px solid white;
            flex-shrink: 0;
        }

        .singer-card .tag {
            display: inline-block;
            background-color: var(--secondary-color);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 4px;
        }

        .singer-card .name {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0 0 4px 0;
        }

        .singer-card .bio {
            font-size: 12px;
            color: #4a5568;
            margin: 0;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .notice-badge {
            font-size: 12.5px;
            color: #dd6b20;
            background-color: #fffaf0;
            border: 1px dashed #fbd38d;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: normal;
            display: block;
            line-height: 1.6;
        }

        .notice-line {
            display: block;
            margin-bottom: 4px;
        }
        .notice-line:last-child {
            margin-bottom: 0;
        }

        .song-list {
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            padding: 6px;
            background-color: #f7fafc;
            max-height: 440px; 
            overflow-y: scroll;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }

        /* 手機常駐滾動軸樣式 */
        .song-list::-webkit-scrollbar {
            width: 8px;
            display: block;
        }

        .song-list::-webkit-scrollbar-track {
            background: #edf2f7;
            border-radius: 4px;
        }

        .song-list::-webkit-scrollbar-thumb {
            background-color: #38b2ac;
            border-radius: 4px;
            border: 1px solid #edf2f7;
        }

        .song-list::-webkit-scrollbar-thumb:hover {
            background-color: #2c7a7b;
        }

        .song-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 8px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            transition: transform 0.3s ease, box-shadow 0.2s ease;
            position: relative;
        }

        .song-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 40px;
            flex-shrink: 0;
            border-right: 1px solid #edf2f7;
            margin-right: 10px;
        }

        .checkbox-wrapper input {
            transform: scale(1.3);
            margin: 0;
            cursor: pointer;
        }

        .song-info-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2px 4px;
            min-width: 0;
            position: relative;
            align-self: stretch;
        }

        /* 亮麗粉藍色計票長條圖 */
        .song-info-block::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--progress, 0%);
            background-color: rgba(56, 178, 172, 0.22);
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap; 
            z-index: 1;
        }

        .song-info-block .title {
            font-weight: bold;
            font-size: 15px;
            color: var(--text-color);
            line-height: 1.4;
        }

        .vote-badge {
            background-color: #feebc8;
            color: #c05621;
            font-size: 11px;
            font-weight: bold;
            padding: 1px 6px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .title-wrapper .desc {
            font-size: 11.5px;
            font-weight: normal;
            color: #a0aec0;
            letter-spacing: 0.2px;
            line-height: 1.4;
        }

        .btn-play-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            width: 76px;
            flex-shrink: 0;
            margin-left: 6px;
        }

        .btn-play {
            background-color: var(--secondary-color);
            color: white !important;
            text-decoration: none;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12.5px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 2px;
            z-index: 1;
            white-space: nowrap;
        }

        .btn-play:hover {
            background-color: #234e52;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;

        }

        .btn-submit:hover {

        }

        .form-control {

            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
    </style>
</head>

<script>
    const gasWebUrl = "https://script.google.com/macros/s/AKfycbzbfBxctNIrO_GkZY557I4ZFwPUubjmkQIYpQ2ybOQ7zKINvoI2Anmvts-aiYSYsoVG_g/exec";
    let currentVotesData = {};

    window.addEventListener('DOMContentLoaded', fetchVotes);

    function fetchVotes() {
        // 💡 加上強制重新整理參數，確保每一次開啟都跟 Google 試算表拿最新活數據
        fetch(`${gasWebUrl}?_=${Date.now()}`)
        .then(response => response.json())
        .then(data => {
            if(data.result === "success") {
                currentVotesData = data.votes;
                updatePageRanking();
            }
        })
        .catch(error => console.error("計票載入失敗:", error));
    }

    function updatePageRanking() {
        let totalVotes = 0;
        for (const count of Object.values(currentVotesData)) {
            totalVotes += parseInt(count) || 0;
        }

        for (const [songName, count] of Object.entries(currentVotesData)) {
            const formattedName = songName.replace(" ", "_");
            const badge = document.getElementById(`count-${formattedName}`);
            const itemRow = document.getElementById(`item-${formattedName}`);
            
            if (badge) badge.innerText = `${count} 票`;
            
            if (itemRow) {
                const percentage = totalVotes === 0 ? 0 : Math.round((count / totalVotes) * 100);
                itemRow.style.setProperty('--progress', `${percentage}%`);
            }
        }

        const container = document.getElementById('songContainer');
        const items = Array.from(container.getElementsByClassName('song-item'));

        items.sort((a, b) => {
            const nameA = a.getAttribute('data-song');
            const nameB = b.getAttribute('data-song');
            const voteA = parseInt(currentVotesData[nameA]) || 0;
            const voteB = parseInt(currentVotesData[nameB]) || 0;
            return voteB - voteA;
        });

        items.forEach(item => container.appendChild(item));
    }

    function checkMaxSelection(element) {
        const checkboxes = document.querySelectorAll('input[name="selectedSong"]:checked');
        if (checkboxes.length > 3) {
            alert("❌ 每人最多只能勾選 3 首歌曲喔！");
            element.checked = false; 
        }
    }

    function submitForm(event) {
        event.preventDefault();

        const nickname = document.getElementById('nickname').value;
        const message = document.getElementById('message').value;
        const submitBtn = document.querySelector('.btn-submit');

        const checkedBoxes = document.querySelectorAll('input[name="selectedSong"]:checked');
        if (checkedBoxes.length === 0) {
            alert("❌ 請至少選擇 1 首您最期待聽到的歌曲！");
            return;
        }

        const selectedSongsArray = [];
        checkedBoxes.forEach(box => selectedSongsArray.push(box.value));
        const combinedSongs = selectedSongsArray.join(", ");

        submitBtn.disabled = true;
        submitBtn.innerText = "正在傳送許願池...";

        const payload = {
            nickname: nickname,
            selectedSong: combinedSongs,
            message: message
        };

        fetch(gasWebUrl, {
            method: "POST",
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.result === "success") {
                alert(`🎉 投票成功！您的願望已送入許願池囉！\n\n點歌人暱稱：${nickname}\n複選歌曲：${combinedSongs}`);
                
                checkedBoxes.forEach(box => {
                    if (currentVotesData.hasOwnProperty(box.value)) {
                        currentVotesData[box.value]++;
                    }
                });
                updatePageRanking();
                
                document.getElementById('voteForm').reset();
            } else {
                alert("寫入錯誤: " + data.error);
            }
        })
        .catch(error => alert("連線伺服器異常，請重新再試！"))
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "送出點歌許願";
        });
    }
</script>
</body>
</html>
