<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【2026馬光家庭日】純愛天后「郭靜」海岸音樂會：同仁專屬點歌許願池</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #319795;
            --background-color: #f0f8ff;
            --card-background: #ffffff;
            --text-color: #2d3748;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, var(--background-color) 0%, #e2e8f0 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        .header p {
            color: #718096;
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .song-list {
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            padding: 10px;
            background-color: #f7fafc;
        }

        .song-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #edf2f7;
            transition: background-color 0.2s;
        }

        .song-item:last-child {
            border-bottom: none;
        }

        .song-item:hover {
            background-color: #edf2f7;
        }

        .song-info {
            display: flex;
            align-items: center;
            flex: 1;
            cursor: pointer;
        }

        .song-info input {
            margin-right: 12px;
            transform: scale(1.2);
        }

        .song-details .title {
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }

        .song-details .desc {
            font-size: 12px;
            color: #718096;
        }

        .btn-play {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-play:hover {
            background-color: #234e52;
        }

        .btn-play.playing {
            background-color: #e53e3e;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #2b6cb0;
        }

        #player-container {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">

                <div class="song-item">

                        </div>
                    </label>
                    <button type="button" class="btn-play" onclick="togglePlay('DduKGmRCqio', 63, this)">▶ 試聽</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="message">許願池留言 / 想對郭靜說的話</label>
            <textarea id="message" class="form-control" rows="4" placeholder="留下你想說的話..."></textarea>
        </div>

        <button type="submit" class="btn-submit">送出點歌許願</button>
    </form>
</div>

<div id="player-container">
    <div id="yt-player"></div>
</div>

<script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    var currentButton = null;
    var stopTimeout;
    const PLAY_DURATION = 30000;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0',
            width: '0',
            videoId: '',
            playerVars: {
                'playsinline': 1,
                'controls': 0,
                'disablekb': 1
            },
            events: {
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function togglePlay(videoId, startTime, button) {
        if (!player || typeof player.cueVideoById !== 'function') {
            alert('音樂播放器準備中，請稍候再試！');
            return;
        }

        if (currentButton === button && player.getPlayerState() === YT.PlayerState.PLAYING) {
            player.pauseVideo();
            resetButton(button);
            return;
        }

        if (currentButton) {
            resetButton(currentButton);
        }
        clearTimeout(stopTimeout);

        currentButton = button;
        button.innerText = "■ 停止";
        button.classList.add('playing');

        player.loadVideoById({
            videoId: videoId,
            startSeconds: startTime
        });

        stopTimeout = setTimeout(function() {
            if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
                player.pauseVideo();
                resetButton(button);
            }
        }, PLAY_DURATION);
    }

    function resetButton(button) {
        button.innerText = "▶ 試聽";
        button.classList.remove('playing');
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED || event.data === YT.PlayerState.PAUSED) {
            if (currentButton && event.data === YT.PlayerState.ENDED) {
                resetButton(currentButton);
                clearTimeout(stopTimeout);
            }
        }
    }

    function submitForm(event) {
        event.preventDefault();

            player.pauseVideo();
            if (currentButton) resetButton(currentButton);
        }

        const message = document.getElementById('message').value;

        submitBtn.disabled = true;
        submitBtn.innerText = "正在傳送許願池...";

            selectedSong: selectedSong,
            message: message
        };
