    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #319795;
            --background-color: #f0f8ff;
            --card-background: #ffffff;
            --text-color: #2d3748;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .main-banner {
            width: 100%;
            height: auto;
            display: block;
        }

        .form-content {
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        .header p {
            color: #718096;
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .singer-card {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border-left: 5px solid var(--secondary-color);
        }

        .singer-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-right: 15px;
            border: 2px solid white;
            flex-shrink: 0;
        }
