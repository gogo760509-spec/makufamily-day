<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【2026馬光家庭日】純愛天后「郭靜」海岸音樂會：同仁專屬點歌許願池</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #319795;
            --background-color: #f0f8ff;
            --card-background: #ffffff;
            --text-color: #2d3748;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, var(--background-color) 0%, #e2e8f0 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: var(--card-background);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .main-banner {
            width: 100%;
            height: auto;
            display: block;
        }

        .form-content {
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        .header p {
            color: #718096;
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .singer-card {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border-left: 5px solid var(--secondary-color);
        }

        .singer-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-right: 15px;
            border: 2px solid white;
            flex-shrink: 0;
        }

        .singer-info-text .tag {
            display: inline-block;
            background-color: var(--secondary-color);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 4px;
        }

        .singer-info-text .name {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0 0 4px 0;
        }

        .singer-info-text .bio {
            font-size: 13px;
            color: #4a5568;
            margin: 0;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .notice-badge {
            font-size: 12px;
            color: #dd6b20;
            background-color: #fffaf0;
            border: 1px dashed #fbd38d;
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: normal;
            display: block;
        }

        .song-list {
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            padding: 10px;
            background-color: #f7fafc;
            max-height: 450px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .song-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 12px;
            border-bottom: 1px solid #edf2f7;
            transition: transform 0.4s ease;
            background-color: transparent;
            overflow: hidden;
        }

        /* 長條圖背景虛擬元素 */
        .song-item::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--progress, 0%);
            background-color: rgba(49, 151, 149, 0.08);
            transition: width 0.8s ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        .song-item:last-child {
            border-bottom: none;
        }

        /* 💡 核心優化：將主要的點選區域設定為完備的 Flexbox 置中環境 */
        .song-info {
            display: flex;
            align-items: center; 
            flex: 1;
            cursor: pointer;
            z-index: 1;
            margin-right: 10px;
            min-width: 0; /* 防止子元素溢出 */
        }

        /* 💡 核心優化：專門限制左側勾選框的容器，強制阻斷任何向上位移的渲染錯誤 */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .checkbox-wrapper input {
            transform: scale(1.2);
            margin: 0;
            padding: 0;
            cursor: pointer;
        }

        /* 💡 核心優化：右側獨立文字區塊 */
        .song-info-block {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-width: 0;
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap; 
        }

        .song-info-block .title {
            font-weight: bold;
            font-size: 15px;
            color: var(--text-color);
            line-height: 1.2;
        }

        .vote-badge {
            background-color: #feebc8;
            color: #c05621;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 12px;
            white-space: nowrap;
        }

        .title-wrapper .desc {
            font-size: 11.5px;
            font-weight: normal;
            color: #a0aec0;
            margin-left: 2px;
            display: inline-block;
            letter-spacing: 0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 超出長度自動遮罩 */
        }

        .btn-play {
            background-color: var(--secondary-color);
            color: white !important;
            text-decoration: none;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12.5px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            z-index: 1;
        }

        .btn-play:hover {
            background-color: #234e52;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #2b6cb0;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="form-content">
        <div class="header">

        <form id="voteForm" onsubmit="submitForm(event)">

                        <label class="song-info">

                                <div class="title-wrapper">

                            <div class="checkbox-wrapper">
                                <input type="checkbox" name="selectedSong" value="在樹上唱歌" onchange="checkMaxSelection(this)">
                            </div>
                            <div class="song-info-block">
                                <div class="title-wrapper">
                                    <span class="title">在樹上唱歌</span>

                                    <span class="desc">｜ 金曲獎輕快俏皮代表作</span>
                                </div>
                            </div>

                        <a href="https://youtu.be/yCq3RLCn2i0?t=63" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 5. 陪著我的時候想著她 -->
                    <div class="song-item" data-song="陪著我的時候想著她" id="item-陪著我的時候想著她">
                        <label class="song-info">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" name="selectedSong" value="陪著我的時候想著她" onchange="checkMaxSelection(this)">
                            </div>
                            <div class="song-info-block">
                                <div class="title-wrapper">
                                    <span class="title">陪著我的時候想著她</span>
                                    <span class="vote-badge" id="count-陪著我的時候想著她">讀取中...</span>
                                    <span class="desc">｜ 揪心系情感渲染力神曲</span>
                                </div>
                            </div>
                        </label>
                        <a href="https://youtu.be/Hn8yhgxpzS4?t=98" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 6. know 知道 -->
                    <div class="song-item" data-song="know 知道" id="item-know_知道">
                        <label class="song-info">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" name="selectedSong" value="know 知道" onchange="checkMaxSelection(this)">
                            </div>
                            <div class="song-info-block">
                                <div class="title-wrapper">
                                    <span class="title">know 知道</span>
                                    <span class="vote-badge" id="count-know_知道">讀取中...</span>
                                    <span class="desc">｜ 內斂深情的雋永經典</span>
                                </div>
                            </div>

                        <a href="https://youtu.be/ROKxPtX-vt8?t=57" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 7. 不藥而癒 -->
                    <div class="song-item" data-song="不藥而癒" id="item-不藥而癒">
                        <label class="song-info">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" name="selectedSong" value="不藥而癒" onchange="checkMaxSelection(this)">
                            </div>
                            <div class="song-info-block">
                                <div class="title-wrapper">
                                    <span class="title">不藥而癒</span>
                                    <span class="vote-badge" id="count-不藥而癒">讀取中...</span>
                                    <span class="desc">｜ 陪伴療傷的標準情歌</span>
                                </div>
                            </div>
                        </label>
                        <a href="https://youtu.be/DduKGmRCqio?t=61" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 8. 仨人 -->
                    <div class="song-item" data-song="仨人" id="item-仨人">
                        <label class="song-info">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" name="selectedSong" value="仨人" onchange="checkMaxSelection(this)">
                            </div>
                            <div class="song-info-block">
                                <div class="title-wrapper">
                                    <span class="title">仨人</span>
                                    <span class="vote-badge" id="count-仨人">讀取中...</span>
                                    <span class="desc">｜ 最具代表性的閨蜜之歌</span>
                                </div>
                            </div>
                        </label>
                        <a href="https://youtu.be/L8sEFu9ByaA?t=70" target="_blank" class="btn-play">▶ 試聽</a>
                    </div>

                    <!-- 9. 每一天都不同 -->
                    <div class="song-item" data-song="每一天都不同" id="item-每一天都不同">
                        <label class="song-info">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" name="selectedSong" value="每一天都不同" onchange="checkMaxSelection(this)">
                            </div>
                            <div class="song-info-block">
                                <div class="title-wrapper">
                                    <span class="title">每一天都不同</span>
                                    <span class="vote-badge" id="count-每一天都不同">讀取中...</span>
                                    <span class="desc">｜ 給予滿滿勇氣的勵志歌</span>
                                </div>

                    <!-- 10. 我們都能幸福著 -->
                    <div class="song-item" data-song="我們都能幸福著" id="item-我們都能幸福著">
                        <label class="song-info">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" name="selectedSong" value="我們都能幸福著" onchange="checkMaxSelection(this)">
                            </div>
                            <div class="song-info-block">
                                <div class="title-wrapper">
                                    <span class="title">我們都能幸福著</span>
                                    <span class="vote-badge" id="count-我們都能幸福著">讀取中...</span>
                                    <span class="desc">｜ 成熟釋懷的溫柔祝福</span>
                                </div>

                    </div>

                    <!-- 11. 往未來飛的客機 -->
                    <div class="song-item" data-song="往未來飛的客機" id="item-往未來飛的客機">

                            <div class="checkbox-wrapper">
                                <input type="checkbox" name="selectedSong" value="往未來飛的客機" onchange="checkMaxSelection(this)">
                            </div>
                            <div class="song-info-block">
                                <div class="title-wrapper">
                                    <span class="title">往未來飛的客機</span>
                                    <span class="vote-badge" id="count-往未來飛的客機">讀取中...</span>
                                    <span class="desc">｜ 致夢想啟航的畢業經典</span>
                                </div>

            <div class="form-group">
                <label for="message">許願池留言 / 想對郭靜說的話</label>
                <textarea id="message" class="form-control" rows="4" placeholder="留下你想說的話..."></textarea>
            </div>

            <button type="submit" class="btn-submit">送出點歌許願</button>
        </form>
    </div>
</div>

<script>
    const gasWebUrl = "https://script.google.com/macros/s/AKfycbzbfBxctNIrO_GkZY557I4ZFwPUubjmkQIYpQ2ybOQ7zKINvoI2Anmvts-aiYSYsoVG_g/exec";
    let currentVotesData = {};

    window.addEventListener('DOMContentLoaded', fetchVotes);

    function fetchVotes() {
        fetch(`${gasWebUrl}?_=${Date.now()}`)
        .then(response => response.json())
        .then(data => {
            if(data.result === "success") {
                currentVotesData = data.votes;
                updatePageRanking();
            }
        })
        .catch(error => console.error("計票載入失敗:", error));
    }

    function updatePageRanking() {
        let totalVotes = 0;
        for (const count of Object.values(currentVotesData)) {
            totalVotes += parseInt(count) || 0;
        }

        for (const [songName, count] of Object.entries(currentVotesData)) {
            const formattedName = songName.replace(" ", "_");
            const badge = document.getElementById(`count-${formattedName}`);
            const itemRow = document.getElementById(`item-${formattedName}`);
            
            if (badge) badge.innerText = `${count} 票`;
            
            if (itemRow) {
                const percentage = totalVotes === 0 ? 0 : Math.round((count / totalVotes) * 100);
                itemRow.style.setProperty('--progress', `${percentage}%`);
            }
        }

        const container = document.getElementById('songContainer');
        const items = Array.from(container.getElementsByClassName('song-item'));

        items.sort((a, b) => {
            const nameA = a.getAttribute('data-song');
            const nameB = b.getAttribute('data-song');
            const voteA = parseInt(currentVotesData[nameA]) || 0;
            const voteB = parseInt(currentVotesData[nameB]) || 0;
            return voteB - voteA;
        });

        items.forEach(item => container.appendChild(item));
    }

    function checkMaxSelection(element) {
        const checkboxes = document.querySelectorAll('input[name="selectedSong"]:checked');
        if (checkboxes.length > 3) {
            alert("❌ 每人最多只能勾選 3 首歌曲喔！");
            element.checked = false; 
        }
    }

    function submitForm(event) {
        event.preventDefault();

        const nickname = document.getElementById('nickname').value;
        const message = document.getElementById('message').value;
        const submitBtn = document.querySelector('.btn-submit');

        const checkedBoxes = document.querySelectorAll('input[name="selectedSong"]:checked');
        if (checkedBoxes.length === 0) {
            alert("❌ 請至少選擇 1 首您最期待聽到的歌曲！");
            return;
        }

        const selectedSongsArray = [];
        checkedBoxes.forEach(box => selectedSongsArray.push(box.value));
        const combinedSongs = selectedSongsArray.join(", ");

        submitBtn.disabled = true;
        submitBtn.innerText = "正在傳送許願池...";

        const payload = {
            nickname: nickname,
            selectedSong: combinedSongs,
            message: message
        };

        fetch(gasWebUrl, {
            method: "POST",
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.result === "success") {
                alert(`🎉 投票成功！您的願望已送入許願池囉！\n\n同仁暱稱：${nickname}\n複選歌曲：${combinedSongs}`);
                
                checkedBoxes.forEach(box => {
                    if (currentVotesData.hasOwnProperty(box.value)) {
                        currentVotesData[box.value]++;
                    }
                });
                updatePageRanking();
                
                document.getElementById('voteForm').reset();
            } else {
                alert("寫入錯誤: " + data.error);
            }
        })
        .catch(error => alert("連線伺服器異常，請重新再試！"))
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "送出點歌送願";
        });
    }
</script>
</body>
</html>
